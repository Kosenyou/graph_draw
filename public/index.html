<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>グラフ作成 Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="app-container">
    <main class="app glass-panel">
      <header class="topbar">
        <div>
          <h1 class="gradient-text">グラフ作成</h1>
          <p>Premium Edition</p>
        </div>
        <div class="actions" style="display: flex; align-items: center; gap: 8px;">
          <div id="authArea" style="margin-right: 16px; display: flex; align-items: center; gap: 8px;">
            <span id="userNameDisplay" style="font-weight: bold; display: none; color: var(--text-secondary);"></span>
            <button id="loginButton" class="secondary-btn" type="button">Googleでログイン</button>
            <button id="logoutButton" class="secondary-btn" type="button" style="display: none;">ログアウト</button>
          </div>
          <button id="savePngButton" type="button" disabled>PNG保存</button>
          <button id="savePdfButton" type="button" disabled>PDF保存</button>
          <button id="saveXlsxButton" type="button" disabled>XLSX保存</button>
          <button id="saveXlsmButton" type="button" disabled>XLSM保存</button>
        </div>
      </header>

      <section class="workspace">
        <aside class="panel">
          <label class="file-picker">
            <span>CSV / Excel読み込み</span>
            <input id="csvInput" type="file" accept=".csv,.xlsx,.xlsm,text/csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel.sheet.macroEnabled.12">
          </label>

          <div id="fileSummary" class="summary">CSVまたはExcelファイルを選択してください。</div>
          <div id="debugTableArea" style="margin-top: 8px; font-size: 0.8em; max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; display: none;"></div>

          <label>
            グラフ種類
            <select id="chartType" disabled>
              <option value="line">折れ線グラフ</option>
              <option value="scatter">散布図</option>
              <option value="bar">棒グラフ</option>
            </select>
          </label>

          <label>
            凡例の位置
            <select id="legendPosition" disabled>
              <option value="top-right">右上</option>
              <option value="top-left">左上</option>
              <option value="bottom-right">右下</option>
              <option value="bottom-left">左下</option>
            </select>
          </label>

          <label style="margin-top: 8px; display: block;">
            <input type="checkbox" id="reverseXAxis" disabled>
            X軸の左右を反転する
          </label>

          <div id="seriesContainer" class="series-container"></div>
          <button id="addSeriesBtn" class="secondary-btn" type="button" disabled style="margin-bottom: 12px;">+ 系列を追加</button>

          <label>
            タイトル
            <input id="chartTitle" type="text" value="グラフ" disabled>
          </label>

          <div class="row-inputs">
            <label>
              X軸ラベル
              <input id="xLabel" type="text" disabled>
            </label>
            <label>
              左Y軸ラベル
              <input id="yLabel" type="text" disabled>
            </label>
            <label>
              右Y軸ラベル
              <input id="yLabelRight" type="text" disabled>
            </label>
          </div>

          <button id="drawButton" class="primary-btn" type="button" disabled>グラフ作成</button>
          
          <hr class="divider">
          <label>
            AI モデル
            <select id="aiModelSelect">
              <option value="gemini-3.5-flash">Gemini 3.5 Flash (最新)</option>
              <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
              <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
              <option value="gemini-1.5-flash-latest">Gemini 1.5 Flash</option>
              <option value="gemini-1.5-pro-latest">Gemini 1.5 Pro</option>
              <option value="gemini-pro-vision">Gemini 1.0 Pro Vision (旧モデル)</option>
              <option value="custom">カスタム (手入力)</option>
            </select>
            <input id="customModelInput" type="text" placeholder="例: gemini-3.5-flash" class="hidden" style="margin-top: 8px;">
          </label>

          <div id="billingArea" style="display: none; margin-bottom: 12px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);">
            <div style="font-size: 0.9em; margin-bottom: 8px;">
              本日無料: <span id="freeUsageDisplay">0</span> / 3回<br>
              追加チャージ: <span id="creditDisplay">0</span> 回分
            </div>
            <button id="chargeButton" class="secondary-btn" style="width: 100%; font-size: 0.9em; padding: 6px;">🎟 200円で50回分チャージ</button>
          </div>

          <button id="aiAnalyzeButton" class="primary-btn ai-btn" type="button" disabled>✨ AIにグラフを分析させる</button>

          <div id="message" class="message" role="status"></div>
        </aside>

        <section class="chart-area">
          <div class="canvas-container">
            <canvas id="chartCanvas" width="1200" height="760" aria-label="グラフ"></canvas>
          </div>
          
          <div id="aiResultArea" class="ai-result-area hidden">
            <h3>🤖 AI 分析レポート</h3>
            <div id="aiResultContent" class="ai-result-content"></div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
